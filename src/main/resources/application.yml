spring:
  application:
    name: carteira-api

  datasource:
    url: jdbc:postgresql://localhost:5432/carteira
    username: carteira
    password: carteira
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate        # Flyway gerencia o schema — Hibernate apenas valida
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method